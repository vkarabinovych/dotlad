NAME="multi-config"
DESC="Deploy multiple files with independent resolver strategies."
ICON="M"
ORDER="400"
CHECK="sh"

[config.settings]
SOURCE="files/settings.conf"
DEST=".tmp/output/multi-config/settings.conf"
RESOLVER="copy"

[config.theme]
SOURCE="files/theme.conf"
DEST=".tmp/output/multi-config/theme.conf"
RESOLVER="symlink"
