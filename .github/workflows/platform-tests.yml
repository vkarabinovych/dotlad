name: Platform tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  linux:
    name: Tests (Ubuntu Bash)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          curl -fsSLo "$RUNNER_TEMP/yq" \
            https://github.com/mikefarah/yq/releases/download/v4.53.3/yq_linux_amd64
          echo "fa52a4e758c63d38299163fbdd1edfb4c4963247918bf9c1c5d31d84789eded4  $RUNNER_TEMP/yq" \
            | sha256sum -c -
          chmod +x "$RUNNER_TEMP/yq"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Bash syntax
        run: |
          /bin/bash --version | head -1
          /bin/bash scripts/check.sh --syntax-only

      - name: Integration suite
        run: /bin/bash tests/run.sh

  macos:
    name: Tests (macOS Bash 3.2)
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Runtime dependencies
        run: brew install jq yq

      - name: Bash 3.2 syntax
        run: |
          /bin/bash --version | head -1
          /bin/bash scripts/check.sh --syntax-only

      - name: Integration suite
        run: /bin/bash tests/run.sh
