name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tests:
    name: Platform tests
    uses: ./.github/workflows/platform-tests.yml

  build:
    name: Validate and build release
    needs: tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-shfmt

      - name: Validate release metadata
        run: |
          test "$GITHUB_REF_NAME" = "v$(cat VERSION)"
          test "$(git cat-file -t "$GITHUB_REF_NAME")" = tag

      - name: Source checks
        run: /bin/bash scripts/check.sh

      - name: Documentation and formatting checks
        run: |
          npx --yes markdownlint-cli2@0.23.1 "**/*.md"
          npx --yes prettier@3.6.2 --check "**/*.{md,yaml,yml}" ".github/**/*.{yaml,yml}"

      - name: Build and verify release bundle
        run: |
          release_dir="$RUNNER_TEMP/release"
          scripts/package.sh "$release_dir"
          archive="dotlad-$(cat VERSION).tar.gz"
          checksums="dotlad-$(cat VERSION).sha256"
          (cd "$release_dir" && sha256sum -c "$checksums")
          tar -tzf "$release_dir/$archive" >/dev/null

      - name: Prepare release notes
        run: |
          notes_file="$RUNNER_TEMP/release/release-notes.md"
          scripts/release-notes.sh "$GITHUB_REF_NAME" > "$notes_file"
          previous_tag="$(git describe --tags --match 'v[0-9]*' --abbrev=0 "$GITHUB_REF_NAME^" 2>/dev/null || true)"
          if [[ -n "$previous_tag" ]]; then
              changes_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/compare/$previous_tag...$GITHUB_REF_NAME"
          else
              commit="$(git rev-parse "$GITHUB_REF_NAME^{commit}")"
              changes_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/commit/$commit"
          fi
          printf '\n**Full Changelog**: %s\n' "$changes_url" >> "$notes_file"

      - name: Upload release bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-bundle
          path: ${{ runner.temp }}/release
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Download release bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-bundle
          path: release

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" release/*.tar.gz release/*.sha256
          --repo "$GITHUB_REPOSITORY" --verify-tag
          --notes-file release/release-notes.md

  homebrew:
    name: Propose Homebrew formula update
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          path: dotlad

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: ter-sh/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Download release checksum
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-bundle
          path: release

      - name: Render and propose formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          branch="dotlad-$version-$GITHUB_RUN_ID"
          dotlad/scripts/render-homebrew-formula.sh \
              "$GITHUB_REF_NAME" "release/dotlad-$version.sha256" \
              homebrew-tap/Formula/dotlad.rb
          cd homebrew-tap
          git switch -c "$branch"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Formula/dotlad.rb
          git commit -m "dotlad $version"
          git push --set-upstream origin "$branch"
          gh pr create --repo ter-sh/homebrew-tap \
              --base main --head "$branch" \
              --title "dotlad $version" \
              --body "Update Dotlad to [$GITHUB_REF_NAME](https://github.com/$GITHUB_REPOSITORY/releases/tag/$GITHUB_REF_NAME)."
