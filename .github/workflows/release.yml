name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release:
    name: Publish release assets
    runs-on: macos-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install shfmt
        run: |
          case "$(uname -m)" in
            arm64)
              asset="shfmt_v3.13.1_darwin_arm64"
              digest="9680526be4a66ea1ffe988ed08af58e1400fe1e4f4aef5bd88b20bb9b3da33f8"
              ;;
            x86_64)
              asset="shfmt_v3.13.1_darwin_amd64"
              digest="6feedafc72915794163114f512348e2437d080d0047ef8b8fa2ec63b575f12af"
              ;;
            *)
              echo "unsupported runner architecture: $(uname -m)" >&2
              exit 1
              ;;
          esac
          curl -fsSLo "$RUNNER_TEMP/shfmt" \
            "https://github.com/mvdan/sh/releases/download/v3.13.1/$asset"
          echo "$digest  $RUNNER_TEMP/shfmt" | shasum -a 256 -c -
          chmod +x "$RUNNER_TEMP/shfmt"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Runtime dependencies
        run: brew install shellcheck jq yq

      - name: Validate and test
        run: |
          test "$GITHUB_REF_NAME" = "v$(cat VERSION)"
          /bin/bash scripts/check.sh
          /bin/bash tests/run.sh

      - name: Build archive and checksum
        run: scripts/package.sh

      - name: Prepare release notes
        run: |
          notes_file="$RUNNER_TEMP/release-notes.md"
          scripts/release-notes.sh "$GITHUB_REF_NAME" > "$notes_file"
          previous_tag="$(git describe --tags --abbrev=0 "$GITHUB_REF_NAME^" 2>/dev/null || true)"
          if [[ -n "$previous_tag" ]]; then
              changes_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/compare/$previous_tag...$GITHUB_REF_NAME"
          else
              commit="$(git rev-parse "$GITHUB_REF_NAME^{commit}")"
              changes_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/commit/$commit"
          fi
          printf '\n**Full Changelog**: %s\n' "$changes_url" >> "$notes_file"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" dist/* --verify-tag
          --notes-file "$RUNNER_TEMP/release-notes.md"
