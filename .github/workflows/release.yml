name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release:
    name: Publish release assets
    runs-on: macos-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Runtime dependencies
        run: brew install shellcheck jq yq

      - name: Validate and test
        run: |
          test "$GITHUB_REF_NAME" = "v$(cat VERSION)"
          /bin/bash scripts/check.sh
          /bin/bash tests/run.sh

      - name: Build archive and checksum
        run: scripts/package.sh

      - name: Prepare release notes
        run: |
          notes_file="$RUNNER_TEMP/release-notes.md"
          scripts/release-notes.sh "$GITHUB_REF_NAME" > "$notes_file"
          previous_tag="$(git describe --tags --abbrev=0 "$GITHUB_REF_NAME^" 2>/dev/null || true)"
          if [[ -n "$previous_tag" ]]; then
              changes_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/compare/$previous_tag...$GITHUB_REF_NAME"
          else
              commit="$(git rev-parse "$GITHUB_REF_NAME^{commit}")"
              changes_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/commit/$commit"
          fi
          printf '\n**Full Changelog**: %s\n' "$changes_url" >> "$notes_file"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" dist/* --verify-tag
          --notes-file "$RUNNER_TEMP/release-notes.md"
