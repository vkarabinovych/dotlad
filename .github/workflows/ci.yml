name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint sources
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: ./.github/actions/setup-shfmt

      - name: Source checks
        run: /bin/bash scripts/check.sh

      - name: Documentation and formatting checks
        run: |
          npx --yes markdownlint-cli2@0.23.1 "**/*.md"
          npx --yes prettier@3.6.2 --check "**/*.{md,yaml,yml}" ".github/**/*.{yaml,yml}"

      - name: Package release asset
        run: |
          scripts/package.sh
          tar -tzf "dist/dotlad-$(cat VERSION).tar.gz" >/dev/null

  tests:
    name: Platform tests
    uses: ./.github/workflows/platform-tests.yml
