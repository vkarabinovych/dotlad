name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint sources
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Source checks
        run: /bin/bash scripts/check.sh

      - name: Markdown checks
        run: |
          npx --yes markdownlint-cli2@0.23.1 "**/*.md"
          npx --yes prettier@3.6.2 --check "**/*.md"

      - name: Package release asset
        run: |
          scripts/package.sh
          tar -tzf "dist/dotlad-$(cat VERSION).tar.gz" >/dev/null

  test-bash32:
    name: Tests (macOS Bash 3.2)
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Runtime dependencies
        run: brew install jq yq

      - name: Bash 3.2 syntax
        run: |
          /bin/bash --version | head -1
          /bin/bash scripts/check.sh --syntax-only

      - name: Integration suite
        run: /bin/bash tests/run.sh
